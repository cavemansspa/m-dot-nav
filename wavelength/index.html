<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wavelength</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --surface2:  #1c1c26;
      --border:    #2a2a38;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --accent:    #ff6b35;
      --accent2:   #7eb8f7;
      --tab-h:     64px;
      --player-h:  68px;
      --nav-h:     52px;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Top nav ── */
    .top-nav {
      height: var(--nav-h);
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      gap: 12px;
    }
    .top-nav .back-btn {
      background: none;
      border: none;
      color: var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-nav .title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Page content area ── */
    .page-area {
      flex: 1;
      overflow: hidden;
      display: grid;
      position: relative;
    }

    /* ── Mini player ── */
    .mini-player {
      height: var(--player-h);
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .mini-player:active { background: var(--surface2); }
    .mini-player.hidden { display: none; }
    .mini-player .track-color {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .mini-player .track-info { flex: 1; overflow: hidden; }
    .mini-player .track-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-player .track-artist {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .mini-player .controls { display: flex; gap: 16px; align-items: center; }
    .mini-player .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
      line-height: 1;
    }

    /* ── Tab bar ── */
    .tab-bar {
      height: var(--tab-h);
      display: flex;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      transition: color 0.15s;
      padding-bottom: 4px;
    }
    .tab-btn.active { color: var(--accent); }
    .tab-btn .tab-icon { font-size: 22px; line-height: 1; }

    /* ── Page styles ── */
    .page {
      height: 100%;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .page-header {
      padding: 20px 16px 12px;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .page-header .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Artist list */
    .artist-list { padding: 0 16px 16px; }
    .artist-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .artist-item:active { opacity: 0.6; }
    .artist-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--bg);
    }
    .artist-info { flex: 1; }
    .artist-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
    }
    .artist-genre { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .artist-chevron { color: var(--muted); font-size: 16px; }

    /* Album list */
    .album-grid { padding: 0 16px 16px; display: grid; gap: 12px; }
    .album-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      gap: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }
    .album-card:active { border-color: var(--accent); }
    .album-art {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .album-info { flex: 1; }
    .album-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
    }
    .album-year { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .album-tracks { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Artist hero */
    .artist-hero {
      padding: 20px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .artist-hero-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--bg);
      flex-shrink: 0;
    }
    .artist-hero-info h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
    }
    .artist-hero-info .genre {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 12px 16px 8px;
    }

    /* Track list */
    .track-list { padding: 0 16px 80px; }
    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .track-item:active { opacity: 0.6; }
    .track-num {
      width: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .track-num.playing { color: var(--accent); }
    .track-title-text {
      flex: 1;
      font-size: 13px;
    }
    .track-title-text.playing {
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .track-dur { font-size: 11px; color: var(--muted); }

    /* Album detail hero */
    .album-hero {
      padding: 20px 16px 16px;
      display: flex;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }
    .album-hero-art {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .album-hero-info h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
    }
    .album-hero-info .artist-link {
      font-size: 13px;
      color: var(--accent2);
      margin-top: 4px;
      cursor: pointer;
    }
    .album-hero-info .year {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Now Playing */
    .now-playing-page {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 32px;
      overflow-y: auto;
    }
    .np-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      align-self: flex-start;
      margin-bottom: 24px;
      padding: 4px;
    }
    .np-art {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      margin-bottom: 28px;
      flex-shrink: 0;
    }
    .np-info { margin-bottom: 24px; }
    .np-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .np-artist { font-size: 14px; color: var(--muted); margin-top: 6px; }
    .np-progress { margin-bottom: 28px; }
    .np-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }
    .np-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 35%;
    }
    .np-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
    .np-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .np-ctrl {
      background: none;
      border: none;
      color: var(--text);
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
    }
    .np-play {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Search */
    .search-bar {
      margin: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
    }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-icon { color: var(--muted); font-size: 16px; }

    .search-section-title {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 12px 16px 6px;
    }
    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .search-result:active { opacity: 0.6; }
    .search-result-icon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .search-result-info { flex: 1; }
    .search-result-title { font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 600; }
    .search-result-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Browse */
    .browse-grid { padding: 0 16px 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .browse-card {
      border-radius: var(--radius);
      padding: 16px 12px;
      cursor: pointer;
      aspect-ratio: 1.4;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s;
    }
    .browse-card:active { transform: scale(0.97); }
    .browse-card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: white;
      position: relative;
      z-index: 1;
    }
    .browse-card-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    /* Radio */
    .radio-list { padding: 0 16px 80px; }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .radio-item:active { opacity: 0.6; }
    .radio-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .radio-info { flex: 1; }
    .radio-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }
    .radio-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Transitions */
    .page-wrapper {
      grid-area: 1/1;
      height: 100%;
      overflow: hidden;
    }

    /* Now playing slide up */
    .now-playing-wrapper {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      max-width: 430px;
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      padding: 40px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  </style>
  <script type="module" crossorigin src="/m-dot-nav/wavelength/assets/index-Dj1phOP6.js"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
